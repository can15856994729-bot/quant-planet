name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuantPlanet-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "量化星球 APK (Latest Build)"
          body: |
            ## 量化星球 QuantPlanet — Android APK

            ### 安装方法（华为 / 小米 / OPPO / 三星等）
            1. 下载 `app-debug.apk`
            2. 打开文件管理器找到 APK，点击安装
            3. 若提示【未知来源】，点击【仍然安装】
            4. 安装完成后桌面出现【量化星球】图标

            ### iPhone 用户（PWA）
            Safari 打开 https://quant-planet.vercel.app → 分享 → 添加到主屏幕

            ---
            > ⚠️ 本App仅供量化策略学习和模拟交易，不构成投资建议。
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
