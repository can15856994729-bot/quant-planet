name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'capacitor.config.ts'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk public/downloads/QuantPlanet.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuantPlanet-APK
          path: public/downloads/QuantPlanet.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "量化星球 APK (Latest)"
          body: |
            ## 量化星球 QuantPlanet Android APK

            **安装方法（华为/Android）：**
            1. 下载 `QuantPlanet.apk`
            2. 用文件管理器打开，允许安装未知来源
            3. 完成安装

            > ⚠️ 本App仅供量化策略学习，不构成投资建议
          files: public/downloads/QuantPlanet.apk
          make_latest: true
