name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/downloads/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Remove APK from Android assets (prevent recursive bundling)
        run: |
          rm -rf android/app/src/main/assets/public/downloads
          echo "=== assets size after cleanup ==="
          du -sh android/app/src/main/assets/public/ || true

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Publish APK to public/downloads
        run: |
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk public/downloads/QuantPlanet.apk
          echo "=== APK file ===" && ls -lh public/downloads/QuantPlanet.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "=== git status before add ===" && git status public/downloads/
          git add -f public/downloads/QuantPlanet.apk
          echo "=== git status after add ===" && git status public/downloads/
          git diff --cached --quiet || git commit -m "update downloadable apk [skip ci]"
          git push origin main

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuantPlanet-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: apk-latest
          name: "量化星球 APK (Latest Build)"
          body: |
            ## 量化星球 QuantPlanet — Android APK

            > ⚠️ **此 APK 仅支持 Android 手机（华为 / 小米 / OPPO / 三星等）**
            > iPhone 用户请勿下载此 APK，请使用下方 PWA 方式安装。

            ---

            ### 📦 Android 安装方法

            **方式一：手机浏览器直接下载（最简单）**
            👉 **https://app.quantplanetapp.com/downloads/QuantPlanet.apk**
            1. 手机浏览器打开上方链接，点击即开始下载
            2. 下载完成后点击安装，若提示【来自未知来源】点【仍然安装】
            3. 安装完成，桌面出现【量化星球】图标即可使用

            **方式二：从本 Release 下载**
            1. 点击下方 `app-debug.apk` 下载安装包
            2. 打开手机文件管理器找到该文件，点击安装

            ---

            ### 🍎 iPhone 用户 — PWA 安装（免 App Store）
            **⚠️ iPhone 不支持 APK，请用以下方式安装：**
            1. 用 **Safari 浏览器**（必须是 Safari，不能用微信/Chrome）打开：
               👉 https://app.quantplanetapp.com
            2. 点击底部工具栏中间的 **分享按钮**（□ 带箭头图标）
            3. 在菜单中选择 **「添加到主屏幕」**
            4. 输入名称后点击 **「添加」**，图标即出现在桌面

            安装后与原生 App 体验一致：全屏显示、无浏览器边框、支持离线缓存。

            ---
            > ⚠️ 本App仅供量化策略学习和模拟交易，不构成投资建议，历史数据不代表未来收益。
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
